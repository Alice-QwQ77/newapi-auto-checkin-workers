name = "newapi-checkin"
main = "src/index.ts"
compatibility_date = "2026-04-25"

[vars]
APP_NAME = "New API Auto Check-in"
LOG_RETENTION_DAYS = "7"

[[d1_databases]]
binding = "DB"
database_name = "newapi-checkin-db"
database_id = "replace-with-your-d1-database-id"

[observability.logs]
enabled = true

[triggers]
crons = ["0 0 * * *"]
